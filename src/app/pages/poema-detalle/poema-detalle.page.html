<ion-header>

  <ion-toolbar>

    <ion-title>

      Detalle del poema

    </ion-title>

  </ion-toolbar>

</ion-header>


<ion-content class="ion-padding">

  <ion-card *ngIf="poema">

    <ion-card-header>

      <ion-card-title>

        {{poema.titulo}}

      </ion-card-title>

    </ion-card-header>


    <ion-card-content>

      <h3>

        {{poema.autor}}

      </h3>

      <p>

        {{poema.contenido}}

      </p>


      <br>

      <img
      [src]="poema.imagen_url"
      width="100%">


      <br><br>


      <iframe
      width="100%"
      height="250"
      [src]="videoSeguro"
      frameborder="0"
      allowfullscreen>

      </iframe>


      <br><br>


      <audio
      controls
      width="100%">

      <source
      [src]="poema.audio_url"
      type="audio/mpeg">

      </audio>

    </ion-card-content>

  </ion-card>

</ion-content>
